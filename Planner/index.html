<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Siquijor Trip Planner</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <header>
            <h1>🌴 Siquijor Trip Planner</h1>
            <p class="subtitle">Your ultimate guide to exploring the Mystical Island</p>
        </header>

        <div class="grid-container">
            
            <section class="card">
                <h2>Itinerary Checker</h2>
                
                <h3>Day 1: Arrival & San Juan Chill</h3>
                <ul>
                    <li>
                        <input type="checkbox" id="d1-1">
                        <label for="d1-1">Arrive at Siquijor Port & Rent a Scooter</label>
                    </li>
                    <li>
                        <input type="checkbox" id="d1-2">
                        <label for="d1-2">Check-in at accommodation in San Juan</label>
                    </li>
                    <li>
                        <input type="checkbox" id="d1-3">
                        <label for="d1-3">Relax at Capilay Spring Park</label>
                    </li>
                    <li>
                        <input type="checkbox" id="d1-4">
                        <label for="d1-4">Catch the sunset at Paliton Beach</label>
                    </li>
                </ul>

                <h3>Day 2: Waterfalls & Mystical Sights</h3>
                <ul>
                    <li>
                        <input type="checkbox" id="d2-1">
                        <label for="d2-1">Fish spa at the Old Enchanted Balete Tree</label>
                    </li>
                    <li>
                        <input type="checkbox" id="d2-2">
                        <label for="d2-2">Visit San Isidro Labrador Parish Church (Lazi)</label>
                    </li>
                    <li>
                        <input type="checkbox" id="d2-3">
                        <label for="d2-3">Swing like Tarzan at Cambugahay Falls</label>
                    </li>
                    <li>
                        <input type="checkbox" id="d2-4">
                        <label for="d2-4">Cliff jumping at Salagdoong Beach</label>
                    </li>
                </ul>

                <h3>Day 3: Heights & Departure</h3>
                <ul>
                    <li>
                        <input type="checkbox" id="d3-1">
                        <label for="d3-1">Drive up to Mt. Bandilaan viewing deck</label>
                    </li>
                    <li>
                        <input type="checkbox" id="d3-2">
                        <label for="d3-2">Buy souvenirs (Love potions / bracelets)</label>
                    </li>
                    <li>
                        <input type="checkbox" id="d3-3">
                        <label for="d3-3">Board the ferry back to Dumaguete/Bohol</label>
                    </li>
                </ul>
            </section>

            <section class="card todo">
                <h2>To-Do & Packing List</h2>
                
                <h3>Pre-Trip Tasks</h3>
                <ul>
                    <li>
                        <input type="checkbox" id="t-1">
                        <label for="t-1">Book OceanJet or Lite Ferry tickets</label>
                    </li>
                    <li>
                        <input type="checkbox" id="t-2">
                        <label for="t-2">Reserve accommodation in San Juan</label>
                    </li>
                    <li>
                        <input type="checkbox" id="t-3">
                        <label for="t-3">Withdraw enough Cash (ATMs can be scarce)</label>
                    </li>
                </ul>

                <h3>What to Pack</h3>
                <ul>
                    <li>
                        <input type="checkbox" id="p-1">
                        <label for="p-1">Reef-safe Sunscreen</label>
                    </li>
                    <li>
                        <input type="checkbox" id="p-2">
                        <label for="p-2">Aqua shoes (essential for rocky beaches/falls)</label>
                    </li>
                    <li>
                        <input type="checkbox" id="p-3">
                        <label for="p-3">Dry bag for waterfall hopping</label>
                    </li>
                    <li>
                        <input type="checkbox" id="p-4">
                        <label for="p-4">Valid ID (needed for scooter rental)</label>
                    </li>
                    <li>
                        <input type="checkbox" id="p-5">
                        <label for="p-5">Power bank & waterproof phone pouch</label>
                    </li>
                </ul>
            </section>

        </div>
    </div>

</body>
</html>
