<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Question for you...</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #ffe6e6;
            font-family: 'Arial', sans-serif;
            text-align: center;
            margin: 0;
            overflow: hidden; /* Prevents scrollbars when the button moves */
        }
        .container {
            background-color: white;
            padding: 40px 30px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            z-index: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 90%;
            max-width: 450px; /* Makes the box wider to fill the screen better */
        }
        h1 {
            color: #d63031;
            margin-bottom: 20px;
            font-size: 32px;
        }
        .cat-image {
            width: 100%;
            max-width: 300px; /* Makes the cat image bigger */
            border-radius: 10px;
            margin-bottom: 30px;
        }
        .btn-container {
            display: flex;
            justify-content: center;
            gap: 20px; /* This forces the buttons to sit side-by-side! */
            width: 100%;
            min-height: 50px;
        }
        .btn {
            font-size: 20px;
            padding: 10px 35px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            transition: 0.1s;
            font-weight: bold;
        }
        .btn-yes {
            background-color: #2ecc71;
            color: white;
        }
        .btn-yes:hover {
            background-color: #27ae60;
            transform: scale(1.1); /* Makes the Yes button pop a bit! */
        }
        .btn-no {
            background-color: #e74c3c;
            color: white;
        }
        .signature {
            margin-top: 25px;
            color: #ff7675;
            font-size: 16px;
            font-style: italic;
            font-weight: bold;
        }
        #success-message {
            display: none;
            color: #d63031;
            font-size: 40px;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div class="container" id="main-box">
        <h1>Will you marry me? 💍</h1>
        
        <img src="images.jpg" alt="Cute proposing cat" class="cat-image">
        
        <div class="btn-container">
            <button class="btn btn-yes" onclick="clickedYes()">Yes</button>
            <button class="btn btn-no" id="btn-no" onmouseover="moveButton()">No</button>
        </div>

        <div class="signature">by bonbon mwamwa</div>
    </div>

    <div id="success-message">
        I love you so much! ❤️
    </div>

    <script>
        // This function makes the No button run away
        function moveButton() {
            const noBtn = document.getElementById('btn-no');
            
            // Calculate a random position within the screen window
            const x = Math.random() * (window.innerWidth - noBtn.offsetWidth);
            const y = Math.random() * (window.innerHeight - noBtn.offsetHeight);
            
            // Switch to fixed positioning only after the first hover so it can fly around the screen
            noBtn.style.position = 'fixed';
            noBtn.style.left = `${x}px`;
            noBtn.style.top = `${y}px`;
        }

        // This function works when she clicks Yes
        function clickedYes() {
            // Hides the question box and shows the I love you message
            document.getElementById("main-box").style.display = "none";
            document.getElementById("success-message").style.display = "block";
        }
    </script>

</body>
</html>
